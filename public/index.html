<!DOCTYPE html>

<html lang=en>
<head>
<meta charset=UTF-8>
<meta name=viewport content=width=device-width,initial-scale=1>
<title>BPR Model</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#e0e0e0;font-family:-apple-system,sans-serif;min-height:100vh;padding:16px}
.hdr{font-size:20px;font-weight:900;margin-bottom:16px}
.log{background:#111;border:1px solid #333;border-radius:8px;padding:10px;margin-bottom:6px;font-family:monospace;font-size:11px;line-height:1.5;word-break:break-word}
.ok{color:#4ecca3}
.err{color:#ff6b6b;background:#2a0505}
.info{color:#888}
.game{background:#111;border:1px solid #333;border-radius:8px;padding:10px;margin-bottom:6px;font-size:12px}
button{background:#4ecca3;color:#000;border:none;padding:10px 20px;border-radius:6px;font-weight:700;margin-bottom:16px;cursor:pointer;margin-right:8px}
</style>
</head>
<body>
<div class=hdr>BPR MODEL</div>
<button onclick=location.reload()>Reload</button>
<div id=out></div>
<script>
const out=document.getElementById(`out`);
function log(m,c){const d=document.createElement(`div`);d.className=`log `+(c||`info`);d.textContent=m;out.appendChild(d);}

async function go(){
log(`Start: `+new Date().toLocaleTimeString(),`info`);
try{
log(`Fetch /api/sports`,`info`);
const r1=await fetch(`/api/sports`);
log(`  status=`+r1.status,`ok`);
const sports=await r1.json();
log(` got`+sports.length+` sports`,`ok`);

log(`Parallel fetch odds`,`info`);
const results=[];
const promises=sports.map(sp=>fetch(`/api/odds?sport=`+sp.key).then(r=>r.json()).then(data=>{
if(Array.isArray(data)){
log(`  `+sp.key+`: `+data.length+` games`,`ok`);
data.forEach(g=>results.push(g));
}
}).catch(e=>log(`  `+sp.key+`ERROR:`+e.message,`err`)));
await Promise.all(promises);
log(`Total: `+results.length+` games`,`ok`);

for(let j=0;j<Math.min(10,results.length);j++){
const g=results[j];
const div=document.createElement(`div`);
div.className=`game`;
div.textContent=g.sport_title+`: `+g.away_team+`@`+g.home_team;
out.appendChild(div);
}
log(`DONE`,`ok`);
}catch(e){
log(`FATAL: `+e.message,`err`);
}
}
go();
</script>

</body>
</html>
