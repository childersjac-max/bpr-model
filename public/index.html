<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPR Model</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600&family=Barlow+Condensed:wght@600;700;900&family=Space+Mono:wght@400;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0a0f;color:#e0e0e0;font-family:'Barlow',sans-serif;min-height:100vh}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .header{background:linear-gradient(135deg,#0d0d1a,#111122);border-bottom:1px solid rgba(255,255,255,0.06);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .header-left{display:flex;align-items:center;gap:10px}
  .header-icon{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#c8102e,#041e42);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
  .header-title{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:900;letter-spacing:1px;color:#fff}
  .header-sub{font-size:10px;color:#555;letter-spacing:1px;margin-top:1px}
  .header-right{display:flex;align-items:center;gap:10px}
  .refresh-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#aaa;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  .refresh-btn.spinning{animation:spin 1s linear infinite}
  .badge-live{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;background:rgba(78,204,163,0.1);border:1px solid rgba(78,204,163,0.3);color:#4ecca3}
  .main{max-width:680px;margin:0 auto;padding:16px 16px}

  /* Tab bar */
  .tab-bar{display:flex;gap:0;margin-bottom:16px;border:1px solid rgba(255,255,255,0.08);border-radius:10px;overflow:hidden}
  .tab-btn{flex:1;background:transparent;border:none;color:#555;padding:10px 8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:0.5px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:all 0.2s}
  .tab-btn.active{background:rgba(255,255,255,0.08);color:#fff}
  .tab-btn:not(:last-child){border-right:1px solid rgba(255,255,255,0.08)}

  .err-msg{color:#ff6b6b;font-size:11px;margin-bottom:12px;font-family:'Space Mono',monospace}
  .status-bar{font-family:'Space Mono',monospace;font-size:10px;color:#555;margin-bottom:12px;display:flex;justify-content:space-between}
  .filters{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .filter-btn{background:transparent;border:1px solid rgba(255,255,255,0.07);border-radius:20px;color:#555;padding:7px 12px;font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  .filter-btn.active{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);color:#fff}
  .count{font-family:'Space Mono',monospace;font-size:10px;color:#444;margin-bottom:12px;letter-spacing:1px}
  .section-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:#333;letter-spacing:2px;text-transform:uppercase;margin:16px 0 8px;padding-bottom:5px;border-bottom:1px solid rgba(255,255,255,0.04)}
  .games{animation:fadeIn 0.3s ease}

  /* Game cards */
  .game-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 16px;cursor:pointer;margin-bottom:8px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  .game-card:active{background:rgba(255,255,255,0.06)}
  .card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .card-top-left{display:flex;align-items:center;gap:7px}
  .sport-label{font-family:'Space Mono',monospace;font-size:10px;color:#666;letter-spacing:1px;text-transform:uppercase}
  .live-dot{background:#ff4444;color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;animation:pulse 1.5s infinite}
  .time-label{font-family:'Space Mono',monospace;font-size:10px;color:#444}
  .matchup{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:10px}
  .team-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:#f0f0f0;line-height:1.2}
  .team-side{font-size:10px;color:#555;margin-top:1px;margin-bottom:5px}
  .team-right{text-align:right}
  .vs{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;color:#222;letter-spacing:2px;text-align:center}
  .odds-chip{display:inline-block;padding:3px 9px;border-radius:5px;font-family:'Space Mono',monospace;font-size:12px;font-weight:700}
  .pos{background:rgba(78,204,163,0.12);color:#4ecca3;border:1px solid rgba(78,204,163,0.3)}
  .neg{background:rgba(255,107,107,0.12);color:#ff6b6b;border:1px solid rgba(255,107,107,0.3)}

  /* Sharp cards */
  .sharp-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 16px;margin-bottom:8px;animation:fadeIn 0.3s ease}
  .sharp-card.rank-1{border-color:rgba(255,200,50,0.3);background:rgba(255,200,50,0.03)}
  .sharp-card.rank-2{border-color:rgba(200,200,200,0.2);background:rgba(200,200,200,0.02)}
  .sharp-card.rank-3{border-color:rgba(180,120,60,0.2);background:rgba(180,120,60,0.02)}
  .sharp-rank{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:#333;min-width:32px}
  .sharp-rank.r1{color:#ffc832}
  .sharp-rank.r2{color:#aaa}
  .sharp-rank.r3{color:#cd7f32}
  .sharp-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .sharp-info{flex:1}
  .sharp-matchup{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:#f0f0f0}
  .sharp-meta{font-family:'Space Mono',monospace;font-size:10px;color:#555;margin-top:2px}
  .sharp-bet-box{background:rgba(78,204,163,0.08);border:1px solid rgba(78,204,163,0.2);border-radius:8px;padding:10px 12px;margin-bottom:8px}
  .sharp-bet-label{font-family:'Space Mono',monospace;font-size:9px;color:#4ecca3;letter-spacing:1px;margin-bottom:4px}
  .sharp-bet-value{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:#fff}
  .sharp-bet-detail{font-family:'Space Mono',monospace;font-size:10px;color:#666;margin-top:2px}
  .sharp-diff{display:flex;gap:8px;align-items:center}
  .sharp-pill{font-family:'Space Mono',monospace;font-size:10px;padding:3px 8px;border-radius:4px}
  .pill-pin{background:rgba(255,200,50,0.1);color:#ffc832;border:1px solid rgba(255,200,50,0.25)}
  .pill-pub{background:rgba(255,255,255,0.05);color:#666;border:1px solid rgba(255,255,255,0.08)}
  .pill-diff{background:rgba(78,204,163,0.1);color:#4ecca3;border:1px solid rgba(78,204,163,0.2);font-weight:700}
  .sharp-type{font-family:'Space Mono',monospace;font-size:9px;padding:2px 8px;border-radius:4px;letter-spacing:0.5px}
  .type-ml{background:rgba(100,100,255,0.1);color:#8888ff;border:1px solid rgba(100,100,255,0.2)}
  .type-ou{background:rgba(255,150,50,0.1);color:#ff9632;border:1px solid rgba(255,150,50,0.2)}

  /* Sharp indicator in expanded */
  .sharp-bar{margin-top:6px;padding:10px 12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px}
  .sharp-section-title{font-family:'Space Mono',monospace;font-size:9px;color:#444;letter-spacing:1px;margin-bottom:8px;text-transform:uppercase}
  .sharp-divider{height:1px;background:rgba(255,255,255,0.05);margin:8px 0}
  .sharp-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .sharp-row:last-child{margin-bottom:0}
  .sharp-team{font-size:11px;color:#888;font-family:'Barlow Condensed',sans-serif;font-weight:600}
  .sharp-pills{display:flex;gap:6px;align-items:center}
  .sharp-signal{font-family:'Space Mono',monospace;font-size:9px;padding:2px 8px;border-radius:4px;letter-spacing:0.5px}
  .signal-sharp{background:rgba(78,204,163,0.15);color:#4ecca3;border:1px solid rgba(78,204,163,0.3)}
  .signal-public{background:rgba(255,107,107,0.1);color:#ff6b6b;border:1px solid rgba(255,107,107,0.2)}
  .signal-none{background:rgba(255,255,255,0.04);color:#555;border:1px solid rgba(255,255,255,0.06)}
  .sharp-legend{display:flex;gap:10px;margin-top:8px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.04)}
  .legend-item{font-family:'Space Mono',monospace;font-size:9px;color:#444}
  .expand-area{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.05);display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .expand-area.one{grid-template-columns:1fr}
  .mkt-title{font-family:'Space Mono',monospace;font-size:9px;color:#444;letter-spacing:1px;margin-bottom:6px}
  .mkt-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
  .mkt-label{font-size:11px;color:#777}
  .expand-hint{text-align:center;margin-top:8px;color:#333;font-size:10px;font-family:'Space Mono',monospace}
  .loading-state{text-align:center;padding:50px 20px;color:#555}
  .spin-icon{font-size:32px;display:inline-block;animation:spin 1.2s linear infinite;margin-bottom:14px}
  .loading-text{font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:2px}
  .loading-sub{font-size:10px;color:#444;margin-top:6px;font-family:'Space Mono',monospace}
  .footer{margin-top:36px;text-align:center;font-size:10px;color:#222;font-family:'Space Mono',monospace;padding-bottom:32px;line-height:1.8}
  .empty-state{text-align:center;padding:50px 20px;color:#444}
  .no-sharp{font-family:'Barlow Condensed',sans-serif;font-size:15px;color:#444;text-align:center;padding:30px 20px}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="header-icon">🎰</div>
    <div>
      <div class="header-title">BPR MODEL</div>
      <div class="header-sub" id="hSub">LOADING...</div>
    </div>
  </div>
  <div class="header-right">
    <div id="hBadge"></div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadOdds()" title="Refresh">&#8635;</button>
  </div>
</div>
<div class="main">
  <div id="errMsg" class="err-msg" style="display:none"></div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tabGames" onclick="switchTab('games')">🎮 GAMES</button>
    <button class="tab-btn" id="tabSharp" onclick="switchTab('sharp')">⚡ SHARP BETS</button>
  </div>

  <div id="tabGamesContent">
    <div class="status-bar"><span id="sLeft">--</span><span id="sRight"></span></div>
    <div class="filters" id="filters"></div>
    <div class="count" id="count"></div>
    <div id="content"></div>
  </div>

  <div id="tabSharpContent" style="display:none">
    <div class="status-bar">
      <span>RANKED BY PINNACLE VS PUBLIC DISCREPANCY</span>
    </div>
    <div id="sharpContent"></div>
  </div>

  <div class="footer">BPR MODEL · Odds: The Odds API · Sharp: Pinnacle vs Public<br>Verify all lines before wagering</div>
</div>
<script>
var BASE = window.location.origin;
var WEEK = 7*24*3600*1000;
var SPORT_EMOJI = {basketball:'🏀',americanfootball:'🏈',baseball:'⚾',icehockey:'🏒',mma:'🥊',boxing:'🥊'};
var S_COLORS = {basketball:'#C9082A',americanfootball:'#013369',baseball:'#002D72',icehockey:'#0033A0',mma:'#B8242B',boxing:'#B8242B'};
var PUBLIC_BOOKS = ['draftkings','fanduel','betmgm','bovada','williamhill_us','barstool','bet365'];
var SHARP_BOOKS = ['pinnacle','circa','bookmaker'];
var allGames = [], currentFilter = 'All', expanded = {}, currentTab = 'games';

function si(k){ return SPORT_EMOJI[k.split('_')[0]] || '🎯'; }
function sc(k){ return S_COLORS[k.split('_')[0]] || '#555'; }
function fmt(p){ return p > 0 ? '+' + p : '' + p; }
function chip(p){ return '<span class="odds-chip '+(p>=0?'pos':'neg')+'">'+fmt(p)+'</span>'; }
function isLive(t){ return new Date(t) < new Date(); }
function fmtTime(t){
  var d=new Date(t),now=new Date(),diff=d-now;
  if(diff<0) return 'In Progress';
  if(diff<10800000){var m=Math.floor(diff/60000),h=Math.floor(m/60);return h>0?h+'h '+(m%60)+'m':m+'m';}
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
}

function switchTab(tab){
  currentTab = tab;
  document.getElementById('tabGames').className = 'tab-btn' + (tab==='games'?' active':'');
  document.getElementById('tabSharp').className = 'tab-btn' + (tab==='sharp'?' active':'');
  document.getElementById('tabGamesContent').style.display = tab==='games'?'block':'none';
  document.getElementById('tabSharpContent').style.display = tab==='sharp'?'block':'none';
}

function getBookOdds(bookmakers, teamName, bookKeys){
  for(var i=0;i<bookmakers.length;i++){
    var bk=bookmakers[i];
    if(bookKeys.indexOf(bk.key)>=0){
      for(var j=0;j<(bk.markets||[]).length;j++){
        if(bk.markets[j].key==='h2h'){
          for(var k=0;k<bk.markets[j].outcomes.length;k++){
            if(bk.markets[j].outcomes[k].name===teamName)
              return {book:bk.title,odds:bk.markets[j].outcomes[k].price};
          }
        }
      }
    }
  }
  return null;
}

function getBookTotal(bookmakers, side, bookKeys){
  for(var i=0;i<bookmakers.length;i++){
    var bk=bookmakers[i];
    if(bookKeys.indexOf(bk.key)>=0){
      for(var j=0;j<(bk.markets||[]).length;j++){
        if(bk.markets[j].key==='totals'){
          for(var k=0;k<bk.markets[j].outcomes.length;k++){
            if(bk.markets[j].outcomes[k].name===side)
              return {book:bk.title,odds:bk.markets[j].outcomes[k].price,point:bk.markets[j].outcomes[k].point};
          }
        }
      }
    }
  }
  return null;
}

// Extract all sharp signals from a game, return array of {score, label, pinOdds, pubOdds, book, type}
function extractSharpSignals(game){
  var bks = game.bookmakers||[];
  var signals = [];
  var teams = [game.away_team, game.home_team];

  // Moneyline signals
  for(var i=0;i<teams.length;i++){
    var team=teams[i];
    var pin=getBookOdds(bks,team,SHARP_BOOKS);
    var pub=getBookOdds(bks,team,PUBLIC_BOOKS);
    if(pin&&pub){
      var diff=pub.odds-pin.odds; // positive = pin shorter = sharp money
      if(diff>=8){
        signals.push({
          score:diff, team:team, game:game,
          pinOdds:pin.odds, pubOdds:pub.odds, pubBook:pub.book,
          type:'ml', label:team, diff:diff
        });
      }
    }
  }

  // Totals signals — line discrepancy
  var pinOver=getBookTotal(bks,'Over',SHARP_BOOKS);
  var pubOver=getBookTotal(bks,'Over',PUBLIC_BOOKS);
  if(pinOver&&pubOver&&pinOver.point!==pubOver.point){
    var lineDiff=Math.abs(pinOver.point-pubOver.point);
    if(lineDiff>=0.5){
      var side=pinOver.point>pubOver.point?'Over':'Under';
      signals.push({
        score:lineDiff*20, // scale for ranking
        game:game, type:'ou',
        label:side+' '+pubOver.point,
        pinLine:pinOver.point, pubLine:pubOver.point,
        pinOdds:pinOver.odds, pubOdds:pubOver.odds,
        pubBook:pubOver.book, diff:lineDiff,
        side:side
      });
    }
  }

  // Totals odds signals
  var pinOv=getBookTotal(bks,'Over',SHARP_BOOKS);
  var pubOv=getBookTotal(bks,'Over',PUBLIC_BOOKS);
  if(pinOv&&pubOv){
    var odiff=pubOv.odds-pinOv.odds;
    if(odiff>=8){
      signals.push({
        score:odiff, game:game, type:'ou',
        label:'Over '+(pubOv.point||''),
        pinOdds:pinOv.odds, pubOdds:pubOv.odds,
        pubBook:pubOv.book, diff:odiff
      });
    }
  }
  var pinUn=getBookTotal(bks,'Under',SHARP_BOOKS);
  var pubUn=getBookTotal(bks,'Under',PUBLIC_BOOKS);
  if(pinUn&&pubUn){
    var udiff=pubUn.odds-pinUn.odds;
    if(udiff>=8){
      signals.push({
        score:udiff, game:game, type:'ou',
        label:'Under '+(pubUn.point||''),
        pinOdds:pinUn.odds, pubOdds:pubUn.odds,
        pubBook:pubUn.book, diff:udiff
      });
    }
  }
  return signals;
}

function renderSharpTab(){
  var allSignals = [];
  for(var i=0;i<allGames.length;i++){
    var sigs=extractSharpSignals(allGames[i]);
    for(var j=0;j<sigs.length;j++) allSignals.push(sigs[j]);
  }
  allSignals.sort(function(a,b){return b.score-a.score;});

  if(!allSignals.length){
    document.getElementById('sharpContent').innerHTML='<div class="no-sharp">No sharp signals detected right now.<br><br>Sharp signals appear when Pinnacle\'s line differs significantly from public books.</div>';
    return;
  }

  var html='<div class="games">';
  for(var i=0;i<allSignals.length;i++){
    var s=allSignals[i], g=s.game;
    var rank=i+1;
    var rankClass=rank===1?'rank-1':rank===2?'rank-2':rank===3?'rank-3':'';
    var rankNumClass=rank===1?'r1':rank===2?'r2':rank===3?'r3':'';
    var typeTag=s.type==='ml'
      ?'<span class="sharp-type type-ml">MONEYLINE</span>'
      :'<span class="sharp-type type-ou">OVER/UNDER</span>';
    var diffDisplay=s.type==='ou'&&s.pinLine
      ?'LINE: '+s.pubLine+' → '+s.pinLine
      :'DIFF: '+fmt(Math.round(s.diff))+' pts';

    html+='<div class="sharp-card '+rankClass+'">'
      +'<div class="sharp-header">'
      +'<div class="sharp-rank '+rankNumClass+'">#'+rank+'</div>'
      +'<div class="sharp-info">'
      +'<div class="sharp-matchup">'+g.away_team.split(' ').slice(-1)[0]+' vs '+g.home_team.split(' ').slice(-1)[0]+'</div>'
      +'<div class="sharp-meta">'+si(g.sport_key)+' '+g.sport_title+' · '+fmtTime(g.commence_time)+'</div>'
      +'</div>'
      +typeTag
      +'</div>'
      +'<div class="sharp-bet-box">'
      +'<div class="sharp-bet-label">⚡ SHARP SIDE</div>'
      +'<div class="sharp-bet-value">'+s.label+'</div>'
      +'<div class="sharp-bet-detail">'+g.away_team+' @ '+g.home_team+'</div>'
      +'</div>'
      +'<div class="sharp-diff">'
      +'<span class="sharp-pill pill-pin">PIN '+fmt(s.pinOdds)+'</span>'
      +'<span class="sharp-pill pill-pub">'+(s.pubBook?s.pubBook.split(' ')[0].toUpperCase():'PUB')+' '+fmt(s.pubOdds)+'</span>'
      +'<span class="sharp-pill pill-diff">'+diffDisplay+'</span>'
      +'</div>'
      +'</div>';
  }
  html+='</div>';
  document.getElementById('sharpContent').innerHTML=html;
}

function renderSharpMoney(game){
  var bks=game.bookmakers||[];
  if(!bks.length) return '';
  var html='<div class="sharp-bar">';
  var teams=[game.away_team,game.home_team];
  var mlRows='', hasMl=false;
  for(var i=0;i<teams.length;i++){
    var team=teams[i];
    var pin=getBookOdds(bks,team,SHARP_BOOKS);
    var pub=getBookOdds(bks,team,PUBLIC_BOOKS);
    if(!pin&&!pub) continue;
    hasMl=true;
    var diff=pin&&pub?pub.odds-pin.odds:0;
    var sig=diff>=8?'sharp':diff<=-8?'public':'none';
    var sigHtml=sig==='sharp'?'<span class="sharp-signal signal-sharp">⚡ SHARP</span>':sig==='public'?'<span class="sharp-signal signal-public">👥 PUBLIC</span>':'<span class="sharp-signal signal-none">--</span>';
    mlRows+='<div class="sharp-row"><span class="sharp-team">'+team.split(' ').slice(-1)[0]+'</span><div class="sharp-pills">'+(pin?'<span class="sharp-pill pill-pin">PIN '+fmt(pin.odds)+'</span>':'')+(pub?'<span class="sharp-pill pill-pub">'+pub.book.split(' ')[0].toUpperCase()+' '+fmt(pub.odds)+'</span>':'')+sigHtml+'</div></div>';
  }
  if(hasMl) html+='<div class="sharp-section-title">MONEYLINE SHARP</div>'+mlRows;

  var pinOver=getBookTotal(bks,'Over',SHARP_BOOKS),pubOver=getBookTotal(bks,'Over',PUBLIC_BOOKS);
  var pinUnder=getBookTotal(bks,'Under',SHARP_BOOKS),pubUnder=getBookTotal(bks,'Under',PUBLIC_BOOKS);
  if(pinOver||pubOver){
    if(hasMl) html+='<div class="sharp-divider"></div>';
    html+='<div class="sharp-section-title">O/U SHARP</div>';
    if(pinOver&&pubOver){
      var odiff=pubOver.odds-pinOver.odds;
      var osig=odiff>=8?'<span class="sharp-signal signal-sharp">⚡</span>':odiff<=-8?'<span class="sharp-signal signal-public">👥</span>':'';
      html+='<div class="sharp-row"><span class="sharp-team">Over '+(pubOver.point||'')+'</span><div class="sharp-pills"><span class="sharp-pill pill-pin">PIN '+fmt(pinOver.odds)+'</span><span class="sharp-pill pill-pub">'+pubOver.book.split(' ')[0].toUpperCase()+' '+fmt(pubOver.odds)+'</span>'+osig+'</div></div>';
    }
    if(pinUnder&&pubUnder){
      var udiff=pubUnder.odds-pinUnder.odds;
      var usig=udiff>=8?'<span class="sharp-signal signal-sharp">⚡</span>':udiff<=-8?'<span class="sharp-signal signal-public">👥</span>':'';
      html+='<div class="sharp-row"><span class="sharp-team">Under '+(pubUnder.point||'')+'</span><div class="sharp-pills"><span class="sharp-pill pill-pin">PIN '+fmt(pinUnder.odds)+'</span><span class="sharp-pill pill-pub">'+pubUnder.book.split(' ')[0].toUpperCase()+' '+fmt(pubUnder.odds)+'</span>'+usig+'</div></div>';
    }
    if(pinOver&&pubOver&&pinOver.point!==pubOver.point){
      var side=pinOver.point>pubOver.point?'⚡ SHARP OVER':'⚡ SHARP UNDER';
      html+='<div class="sharp-row" style="margin-top:4px"><span class="sharp-team" style="color:#666">LINE</span><div class="sharp-pills"><span class="sharp-pill pill-pub">PUB '+pubOver.point+'</span><span class="sharp-pill pill-pin">PIN '+pinOver.point+'</span><span class="sharp-signal signal-sharp">'+side+'</span></div></div>';
    }
  }
  html+='<div class="sharp-legend"><div class="legend-item">📌 PIN = Pinnacle</div><div class="legend-item">⚡ Sharp | 👥 Public</div></div></div>';
  return html;
}

function setFilter(f){currentFilter=f;renderFilters();renderGames();}
function toggleExpand(id){expanded[id]=!expanded[id];renderGames();}

function renderFilters(){
  var sports=['All'],seen={};
  for(var i=0;i<allGames.length;i++){if(!seen[allGames[i].sport_title]){seen[allGames[i].sport_title]=true;sports.push(allGames[i].sport_title);}}
  var html='';
  for(var i=0;i<sports.length;i++){
    var s=sports[i],active=currentFilter===s?' active':'',key='';
    for(var j=0;j<allGames.length;j++){if(allGames[j].sport_title===s){key=allGames[j].sport_key;break;}}
    html+='<button class="filter-btn'+active+'" onclick="setFilter(\''+s.replace(/'/g,"\\'")+'\')">'+(s==='All'?'All':si(key)+' '+s)+'</button>';
  }
  document.getElementById('filters').innerHTML=html;
}

function renderGames(){
  var filtered=[];
  for(var i=0;i<allGames.length;i++){if(currentFilter==='All'||allGames[i].sport_title===currentFilter)filtered.push(allGames[i]);}
  document.getElementById('count').textContent=filtered.length+' GAME'+(filtered.length!==1?'S':'')+' · NEXT 7 DAYS';
  var byDate={},dateOrder=[];
  for(var i=0;i<filtered.length;i++){
    var g=filtered[i],label=new Date(g.commence_time).toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
    if(!byDate[label]){byDate[label]=[];dateOrder.push(label);}
    byDate[label].push(g);
  }
  var html='<div class="games">';
  for(var di=0;di<dateOrder.length;di++){
    var dateLabel=dateOrder[di],games=byDate[dateLabel];
    html+='<div class="section-label">'+dateLabel+'</div>';
    for(var gi=0;gi<games.length;gi++){
      var game=games[gi],bks=game.bookmakers||[];
      var pubBk=null;
      for(var bi=0;bi<bks.length;bi++){if(PUBLIC_BOOKS.indexOf(bks[bi].key)>=0){pubBk=bks[bi];break;}}
      if(!pubBk&&bks.length)pubBk=bks[0];
      var h2h=null,spreads=null,totals=null;
      if(pubBk){for(var mi=0;mi<(pubBk.markets||[]).length;mi++){
        if(pubBk.markets[mi].key==='h2h')h2h=pubBk.markets[mi];
        if(pubBk.markets[mi].key==='spreads')spreads=pubBk.markets[mi];
        if(pubBk.markets[mi].key==='totals')totals=pubBk.markets[mi];
      }}
      var awayO=null,homeO=null;
      if(h2h){for(var oi=0;oi<h2h.outcomes.length;oi++){
        if(h2h.outcomes[oi].name===game.away_team)awayO=h2h.outcomes[oi];
        if(h2h.outcomes[oi].name===game.home_team)homeO=h2h.outcomes[oi];
      }}
      var isExp=!!expanded[game.id],accent=sc(game.sport_key);
      var details='';
      if(isExp){
        details+=renderSharpMoney(game);
        if(spreads||totals){
          details+='<div class="expand-area'+(spreads&&totals?'':' one')+'">';
          if(spreads){details+='<div><div class="mkt-title">SPREAD</div>';for(var si2=0;si2<spreads.outcomes.length;si2++){var o=spreads.outcomes[si2],pt=o.point>0?'+'+o.point:''+o.point;details+='<div class="mkt-row"><span class="mkt-label">'+o.name.split(' ').pop()+' '+pt+'</span>'+chip(o.price)+'</div>';}details+='</div>';}
          if(totals){var tl=totals.outcomes.length?totals.outcomes[0].point:'';details+='<div><div class="mkt-title">TOTAL ('+tl+')</div>';for(var ti=0;ti<totals.outcomes.length;ti++){var o=totals.outcomes[ti];details+='<div class="mkt-row"><span class="mkt-label">'+o.name+'</span>'+chip(o.price)+'</div>';}details+='</div>';}
          details+='</div>';
        }
      }
      html+='<div class="game-card" style="border-left:3px solid '+accent+'" onclick="toggleExpand(\''+game.id+'\')">'
        +'<div class="card-top"><div class="card-top-left"><span>'+si(game.sport_key)+'</span><span class="sport-label">'+game.sport_title+'</span>'+(isLive(game.commence_time)?'<span class="live-dot">LIVE</span>':'')+'</div><span class="time-label">🕐 '+fmtTime(game.commence_time)+'</span></div>'
        +'<div class="matchup"><div><div class="team-name">'+game.away_team+'</div><div class="team-side">Away</div>'+(awayO?chip(awayO.price):'')+'</div><div class="vs">VS</div><div class="team-right"><div class="team-name">'+game.home_team+'</div><div class="team-side">Home</div>'+(homeO?chip(homeO.price):'')+'</div></div>'
        +details+'<div class="expand-hint">'+(isExp?'▲ collapse':'▼ sharp money + lines')+'</div></div>';
    }
  }
  html+='</div>';
  document.getElementById('content').innerHTML=html;
}

async function loadOdds(){
  var btn=document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('hSub').textContent='LOADING...';
  document.getElementById('hBadge').innerHTML='';
  document.getElementById('errMsg').style.display='none';
  document.getElementById('content').innerHTML='<div class="loading-state"><div class="spin-icon">⚙️</div><div class="loading-text">FETCHING ODDS</div><div class="loading-sub" id="loadSub">Getting sports...</div></div>';
  document.getElementById('sharpContent').innerHTML='';
  try{
    var sportsResp=await fetch(BASE+'/api/sports');
    var sports=await sportsResp.json();
    if(!Array.isArray(sports))throw new Error(sports.message||sports.error||'API error');
    var now=Date.now(),results=[];
    for(var i=0;i<sports.length;i++){
      var sport=sports[i];
      var sub=document.getElementById('loadSub');
      if(sub)sub.textContent='Fetching '+sport.title+'...';
      try{
        var resp=await fetch(BASE+'/api/odds?sport='+sport.key);
        var data=await resp.json();
        if(Array.isArray(data)){for(var j=0;j<data.length;j++){var t=new Date(data[j].commence_time).getTime();if(t>=now-7200000&&t<=now+WEEK)results.push(data[j]);}}
      }catch(e){}
    }
    results.sort(function(a,b){return new Date(a.commence_time)-new Date(b.commence_time);});
    allGames=results;
    if(!results.length){
      document.getElementById('hSub').textContent='NO GAMES FOUND';
      document.getElementById('content').innerHTML='<div class="empty-state"><div style="font-size:36px;margin-bottom:12px">📭</div><div style="font-family:Barlow Condensed,sans-serif;font-size:16px">No upcoming games found</div></div>';
    }else{
      var sCount={};for(var i=0;i<results.length;i++)sCount[results[i].sport_title]=true;
      document.getElementById('hBadge').innerHTML='<span class="badge-live">LIVE</span>';
      document.getElementById('hSub').textContent='UPDATED '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
      document.getElementById('sLeft').textContent=results.length+' GAMES · '+Object.keys(sCount).length+' SPORTS';
      document.getElementById('sRight').textContent='ODDS + SHARP';
      renderFilters();renderGames();renderSharpTab();
    }
  }catch(e){
    document.getElementById('errMsg').textContent='Error: '+e.message;
    document.getElementById('errMsg').style.display='block';
    document.getElementById('hSub').textContent='ERROR';
    document.getElementById('content').innerHTML='';
  }finally{btn.classList.remove('spinning');}
}
loadOdds();
</script>
