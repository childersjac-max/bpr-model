<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPR Model</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
.hdr{background:linear-gradient(135deg,#0d0d1a,#111122);border-bottom:1px solid rgba(255,255,255,.06);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#c8102e,#041e42);display:flex;align-items:center;justify-content:center;font-size:16px}
.hdr-title{font-size:18px;font-weight:900;letter-spacing:1px;color:#fff}
.hdr-sub{font-size:10px;color:#555;letter-spacing:1px}
.rfsh{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#aaa;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px}
.rfsh.spin{animation:spin 1s linear infinite}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;background:rgba(78,204,163,.1);border:1px solid rgba(78,204,163,.3);color:#4ecca3}
.main{max-width:680px;margin:0 auto;padding:14px}
.tabs{display:flex;margin-bottom:14px;border:1px solid rgba(255,255,255,.08);border-radius:10px;overflow:hidden}
.tab{flex:1;background:transparent;border:none;color:#555;padding:9px 2px;font-weight:700;font-size:10px;cursor:pointer}
.tab.on{background:rgba(255,255,255,.08);color:#fff}
.tab+.tab{border-left:1px solid rgba(255,255,255,.08)}
.sb{font-size:10px;color:#555;margin-bottom:10px;display:flex;justify-content:space-between;font-family:monospace}
.fltrs{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;padding-bottom:3px}
.fbtn{background:transparent;border:1px solid rgba(255,255,255,.07);border-radius:20px;color:#555;padding:6px 11px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.fbtn.on{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:#fff}
.cnt{font-size:10px;color:#444;margin-bottom:10px;font-family:monospace}
.dl{font-size:11px;font-weight:700;color:#333;letter-spacing:2px;text-transform:uppercase;margin:14px 0 7px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,.04)}
.gc{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:13px 15px;cursor:pointer;margin-bottom:7px}
.gt{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.gtl{display:flex;align-items:center;gap:6px}
.sl{font-size:10px;color:#666;letter-spacing:1px;font-family:monospace}
.live{background:#ff4444;color:#fff;font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;animation:pulse 1.5s infinite}
.tl{font-size:10px;color:#444;font-family:monospace}
.mu{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:7px;margin-bottom:9px}
.tn{font-size:15px;font-weight:700;color:#f0f0f0;line-height:1.2}
.ts{font-size:10px;color:#555;margin-top:1px;margin-bottom:4px}
.tr{text-align:right}
.vs{font-size:15px;font-weight:900;color:#222;letter-spacing:2px;text-align:center}
.oc{display:inline-block;padding:3px 8px;border-radius:5px;font-size:12px;font-weight:700;font-family:monospace}
.pos{background:rgba(78,204,163,.12);color:#4ecca3;border:1px solid rgba(78,204,163,.3)}
.neg{background:rgba(255,107,107,.12);color:#ff6b6b;border:1px solid rgba(255,107,107,.3)}
.eh{text-align:center;color:#333;font-size:10px;margin-top:6px;font-family:monospace}
.xp{margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.05)}
.xp-title{font-size:9px;color:#444;letter-spacing:1px;margin-bottom:6px;font-family:monospace}
.xp-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.xp-team{font-size:12px;color:#888;font-weight:600}
.xp-pills{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.pp{font-size:10px;padding:2px 6px;border-radius:4px;font-family:monospace}
.pin{background:rgba(255,200,50,.1);color:#ffc832;border:1px solid rgba(255,200,50,.25)}
.pub{background:rgba(255,255,255,.05);color:#666;border:1px solid rgba(255,255,255,.08)}
.sig{font-size:9px;padding:2px 7px;border-radius:4px;font-family:monospace;background:rgba(78,204,163,.15);color:#4ecca3;border:1px solid rgba(78,204,163,.3)}
.sc{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:13px 15px;margin-bottom:7px}
.sh{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.sr{font-size:26px;font-weight:900;color:#333;min-width:30px}
.sm{font-size:14px;font-weight:700;color:#f0f0f0}
.smeta{font-size:10px;color:#555;margin-top:2px;font-family:monospace}
.sbb{background:rgba(78,204,163,.08);border:1px solid rgba(78,204,163,.2);border-radius:8px;padding:9px 11px;margin-bottom:7px}
.sbl{font-size:9px;color:#4ecca3;letter-spacing:1px;margin-bottom:3px;font-family:monospace}
.sbv{font-size:15px;font-weight:700;color:#fff}
.empty{font-size:15px;color:#444;text-align:center;padding:28px 20px;line-height:1.6}
.lstate{text-align:center;padding:40px 20px;color:#555}
.lico{font-size:30px;display:inline-block;animation:spin 1.2s linear infinite;margin-bottom:12px}
.ltxt{font-size:14px;letter-spacing:2px}
.footer{margin-top:32px;text-align:center;font-size:10px;color:#222;padding-bottom:28px;line-height:1.8;font-family:monospace}
.sec{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;margin-bottom:10px;overflow:hidden}
.sec-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.sec-header:active{background:rgba(255,255,255,.04)}
.sec-emoji{font-size:22px}
.sec-info{flex:1}
.sec-title{font-size:13px;font-weight:900;color:#fff;letter-spacing:1px}
.sec-count{font-size:10px;color:#888;font-family:monospace;margin-top:2px}
.sec-arrow{font-size:14px;color:#666;transition:transform 0.2s}
.sec.open .sec-arrow{transform:rotate(180deg)}
.sec-body{display:none;padding:0 16px 14px;border-top:1px solid rgba(255,255,255,.06)}
.sec.open .sec-body{display:block}
.sec-signals{margin-top:12px}
.sec-instr{font-size:11px;color:#888;line-height:1.5;padding:12px;background:rgba(78,204,163,.04);border-left:2px solid #4ecca3;border-radius:4px;margin-top:12px}
.sec-instr strong{color:#4ecca3}
.sig-steam{background:rgba(255,107,107,.15);color:#ff6b6b;border:1px solid rgba(255,107,107,.3);font-size:9px;padding:2px 7px;border-radius:4px;font-family:monospace}
.sig-rlm{background:rgba(255,200,50,.15);color:#ffc832;border:1px solid rgba(255,200,50,.3);font-size:9px;padding:2px 7px;border-radius:4px;font-family:monospace}
.sig-clv{background:rgba(138,43,226,.15);color:#b99aff;border:1px solid rgba(138,43,226,.3);font-size:9px;padding:2px 7px;border-radius:4px;font-family:monospace}
.src-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.src-card:active{background:rgba(255,255,255,.06)}
.src-name{font-size:16px;font-weight:900;color:#fff;margin-bottom:4px}
.src-meta{font-size:11px;color:#888;font-family:monospace}
.src-count{background:rgba(78,204,163,.15);color:#4ecca3;border:1px solid rgba(78,204,163,.3);padding:4px 10px;border-radius:20px;font-size:13px;font-weight:700;font-family:monospace}
.back-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#aaa;padding:8px 14px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;margin-bottom:12px;display:inline-flex;align-items:center;gap:6px}
.back-btn:active{background:rgba(255,255,255,.1)}
.legend{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px;margin-top:24px}
.legend-title{font-size:12px;font-weight:900;color:#fff;letter-spacing:2px;margin-bottom:10px;border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:6px}
.legend-item{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.legend-item:last-child{margin-bottom:0}
.legend-emoji{font-size:20px;min-width:24px}
.legend-text{flex:1}
.legend-name{font-size:12px;font-weight:700;color:#fff}
.legend-desc{font-size:10px;color:#888;margin-top:2px;line-height:1.4}
</style>
</head>
<body>
<div class="hdr">
<div class="hdr-l">
<div class="hdr-icon">🎰</div>
<div><div class="hdr-title">BPR MODEL</div><div class="hdr-sub" id="hSub">LOADING...</div></div>
</div>
<div style="display:flex;align-items:center;gap:8px">
<div id="hBadge"></div>
<button class="rfsh" id="rfBtn" onclick="init()">&#8635;</button>
</div>
</div>
<div class="main">
<div class="tabs">
<button class="tab on" id="t0" onclick="goTab(0)">GAMES</button>
<button class="tab" id="t1" onclick="goTab(1)">SHARP</button>
<button class="tab" id="t2" onclick="goTab(2)">MODEL</button>
<button class="tab" id="t3" onclick="goTab(3)">PICKS</button>
</div>
<div id="v0">
<div class="sb"><span id="sL">--</span><span id="sR"></span></div>
<div class="fltrs" id="fltrs"></div>
<div class="cnt" id="cnt"></div>
<div id="games"><div class="lstate"><div class="lico">⚙️</div><div class="ltxt">LOADING</div></div></div>
</div>
<div id="v1" style="display:none">
<div class="sb"><span>ADVANCED SHARP ANALYSIS</span></div>
<div id="sharp"></div>
</div>
<div id="v2" style="display:none">
<div class="sb"><span>BPR MODEL - SHARP + EV</span></div>
<div id="model"></div>
</div>
<div id="v3" style="display:none">
<div id="picks"><div class="lstate"><div class="lico">⚙️</div><div class="ltxt">LOADING PICKS</div></div></div>
</div>
<div class="footer">BPR MODEL - Odds: The Odds API - Sharp: Pinnacle vs Public<br>Verify all lines before wagering</div>
</div>
<script>
const WEEK = 14 * 24 * 3600 * 1000;
const PUB = ["draftkings", "fanduel", "betmgm", "bovada", "williamhill_us", "bet365"];
const SHP = ["pinnacle", "circa", "bookmaker"];
const FIGHT_SPORTS = ["mma_mixed_martial_arts", "boxing_boxing"];
let allGames = [], curFilter = "All", curTab = 0, expanded = {};
let allPicks = [];
let picksView = "sources", selectedSource = null;
let modelView = "sports", selectedModelSport = null;
let sharpOpen = {};
let oddsHistory = {};

try {
  const saved = localStorage.getItem("bpr_odds_history");
  if (saved) oddsHistory = JSON.parse(saved);
} catch(e) {}

function saveHistory() {
  try {
    const cutoff = Date.now() - WEEK;
    Object.keys(oddsHistory).forEach(id => {
      oddsHistory[id] = oddsHistory[id].filter(s => s.ts > cutoff);
      if (oddsHistory[id].length === 0) delete oddsHistory[id];
    });
    localStorage.setItem("bpr_odds_history", JSON.stringify(oddsHistory));
  } catch(e) {}
}

function captureSnapshot(game) {
  const bks = game.bookmakers || [];
  const snapshot = { ts: Date.now(), books: {} };
  bks.forEach(b => {
    const h2h = (b.markets || []).find(m => m.key === "h2h");
    if (h2h) {
      snapshot.books[b.key] = {};
      h2h.outcomes.forEach(o => { snapshot.books[b.key][o.name] = o.price; });
    }
  });
  if (!oddsHistory[game.id]) oddsHistory[game.id] = [];
  const last = oddsHistory[game.id][oddsHistory[game.id].length - 1];
  if (!last || JSON.stringify(last.books) !== JSON.stringify(snapshot.books)) {
    oddsHistory[game.id].push(snapshot);
    if (oddsHistory[game.id].length > 30) oddsHistory[game.id] = oddsHistory[game.id].slice(-30);
  }
}

function goTab(n) {
  curTab = n;
  for (let i = 0; i < 4; i++) {
    document.getElementById("t" + i).className = "tab" + (i === n ? " on" : "");
    document.getElementById("v" + i).style.display = i === n ? "block" : "none";
  }
}

function fmt(p) { return p > 0 ? "+" + p : "" + p; }
function chip(p) { return '<span class="oc ' + (p >= 0 ? "pos" : "neg") + '">' + fmt(p) + '</span>'; }
function isLive(t) { return new Date(t) < new Date(); }
function fmtT(t) {
  const d = new Date(t), now = new Date(), df = d - now;
  if (df < 0) return "In Progress";
  if (df < 10800000) { const m = Math.floor(df / 60000), h = Math.floor(m / 60); return h > 0 ? h + "h " + (m % 60) + "m" : m + "m"; }
  return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
}

function bkOdds(bks, name, keys) {
  for (const b of bks) {
    if (keys.includes(b.key)) {
      for (const m of (b.markets || [])) {
        if (m.key === "h2h") {
          for (const o of m.outcomes) {
            if (o.name === name) return { bk: b.title, o: o.price };
          }
        }
      }
    }
  }
  return null;
}

function toggle(id) { expanded[id] = !expanded[id]; renderGames(); }
function setFilter(f) { curFilter = f; renderFltrs(); renderGames(); }
function toggleSharp(key) { sharpOpen[key] = !sharpOpen[key]; renderSharp(); }

function renderFltrs() {
  const sp = ["All"], seen = {};
  allGames.forEach(g => { if (!seen[g.sport_title]) { seen[g.sport_title] = true; sp.push(g.sport_title); } });
  let h = "";
  sp.forEach(s => {
    const ac = curFilter === s ? " on" : "";
    h += '<button class="fbtn' + ac + '" onclick="setFilter(\'' + s + '\')">' + s + '</button>';
  });
  document.getElementById("fltrs").innerHTML = h;
}

function renderExpand(game) {
  const bks = game.bookmakers || [];
  if (!bks.length) return "";
  let h = '<div class="xp">';
  const teams = [game.away_team, game.home_team];
  let mlRows = "", hasMl = false;
  teams.forEach(t => {
    const pin = bkOdds(bks, t, SHP), pub = bkOdds(bks, t, PUB);
    if (!pin && !pub) return;
    hasMl = true;
    const d = pin && pub ? pub.o - pin.o : 0;
    const sh = d >= 8 ? '<span class="sig">SHARP</span>' : "";
    mlRows += '<div class="xp-row"><span class="xp-team">' + t.split(" ").pop() + '</span><div class="xp-pills">' + (pin ? '<span class="pp pin">PIN ' + fmt(pin.o) + '</span>' : "") + (pub ? '<span class="pp pub">' + pub.bk.split(" ")[0].toUpperCase() + " " + fmt(pub.o) + '</span>' : "") + sh + '</div></div>';
  });
  if (hasMl) h += '<div class="xp-title">MONEYLINE</div>' + mlRows;
  h += '</div>';
  return h;
}

function renderGames() {
  const fl = allGames.filter(g => curFilter === "All" || g.sport_title === curFilter);
  document.getElementById("cnt").textContent = fl.length + " GAMES";
  if (!fl.length) {
    document.getElementById("games").innerHTML = '<div class="empty">No games found. Try refreshing.</div>';
    return;
  }
  const bd = {}, bo = [];
  fl.forEach(g => {
    const lbl = new Date(g.commence_time).toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" });
    if (!bd[lbl]) { bd[lbl] = []; bo.push(lbl); }
    bd[lbl].push(g);
  });
  let h = "";
  bo.forEach(day => {
    h += '<div class="dl">' + day + '</div>';
    bd[day].forEach(game => {
      const bks = game.bookmakers || [];
      let pubBk = bks.find(b => PUB.includes(b.key)) || bks[0];
      const h2h = pubBk ? (pubBk.markets || []).find(m => m.key === "h2h") : null;
      const awO = h2h ? h2h.outcomes.find(o => o.name === game.away_team) : null;
      const hmO = h2h ? h2h.outcomes.find(o => o.name === game.home_team) : null;
      const isX = !!expanded[game.id];
      h += '<div class="gc" onclick="toggle(\'' + game.id + '\')"><div class="gt"><div class="gtl"><span class="sl">' + game.sport_title + '</span>' + (isLive(game.commence_time) ? '<span class="live">LIVE</span>' : "") + '</div><span class="tl">' + fmtT(game.commence_time) + '</span></div><div class="mu"><div><div class="tn">' + game.away_team + '</div><div class="ts">Away</div>' + (awO ? chip(awO.price) : "") + '</div><div class="vs">VS</div><div class="tr"><div class="tn">' + game.home_team + '</div><div class="ts">Home</div>' + (hmO ? chip(hmO.price) : "") + '</div></div>' + (isX ? renderExpand(game) : "") + '<div class="eh">' + (isX ? "collapse" : "tap for sharp") + '</div></div>';
    });
  });
  document.getElementById("games").innerHTML = h;
}

function detectLineMovement(game) {
  const history = oddsHistory[game.id] || [];
  if (history.length < 2) return null;
  const first = history[0];
  const last = history[history.length - 1];
  const movements = {};
  [game.away_team, game.home_team].forEach(team => {
    const firstPrices = [], lastPrices = [];
    Object.keys(last.books).forEach(bk => {
      if (PUB.includes(bk) && last.books[bk][team] != null && first.books[bk] && first.books[bk][team] != null) {
        firstPrices.push(first.books[bk][team]);
        lastPrices.push(last.books[bk][team]);
      }
    });
    if (firstPrices.length >= 2) {
      const firstAvg = firstPrices.reduce((a, b) => a + b, 0) / firstPrices.length;
      const lastAvg = lastPrices.reduce((a, b) => a + b, 0) / lastPrices.length;
      movements[team] = { start: firstAvg, end: lastAvg, diff: lastAvg - firstAvg, snapshots: history.length };
    }
  });
  return movements;
}

function detectSteamMove(game) {
  const history = oddsHistory[game.id] || [];
  if (history.length < 2) return null;
  const recent = history.slice(-3);
  if (recent.length < 2) return null;
  const first = recent[0], last = recent[recent.length - 1];
  const steamTeams = [];
  [game.away_team, game.home_team].forEach(team => {
    let booksMovedSame = 0;
    let totalMovement = 0;
    Object.keys(last.books).forEach(bk => {
      if (last.books[bk][team] != null && first.books[bk] && first.books[bk][team] != null) {
        const diff = last.books[bk][team] - first.books[bk][team];
        if (Math.abs(diff) >= 5) {
          booksMovedSame++;
          totalMovement += diff;
        }
      }
    });
    if (booksMovedSame >= 3) {
      steamTeams.push({ team, books: booksMovedSame, avgMove: totalMovement / booksMovedSame });
    }
  });
  return steamTeams.length > 0 ? steamTeams : null;
}

function detectRLM(game) {
  const bks = game.bookmakers || [];
  const movement = detectLineMovement(game);
  if (!movement) return null;
  const results = [];
  [game.away_team, game.home_team].forEach(team => {
    if (!movement[team]) return;
    const pub = bkOdds(bks, team, PUB);
    const pin = bkOdds(bks, team, SHP);
    if (!pub || !pin) return;
    const lineMovedAgainst = movement[team].diff < -5;
    const sharpLonger = pin.o > pub.o + 5;
    if (lineMovedAgainst && sharpLonger) {
      results.push({ team, pubOdds: pub.o, pinOdds: pin.o, movement: movement[team].diff });
    }
  });
  return results.length > 0 ? results : null;
}

function calcCLV(game) {
  const bks = game.bookmakers || [];
  const results = [];
  [game.away_team, game.home_team].forEach(team => {
    const pin = bkOdds(bks, team, SHP);
    const pub = bkOdds(bks, team, PUB);
    if (!pin || !pub) return;
    const pinProb = pin.o > 0 ? 100 / (pin.o + 100) : Math.abs(pin.o) / (Math.abs(pin.o) + 100);
    const pubProb = pub.o > 0 ? 100 / (pub.o + 100) : Math.abs(pub.o) / (Math.abs(pub.o) + 100);
    const clvPct = ((pinProb - pubProb) / pubProb) * 100;
    if (clvPct > 3) {
      results.push({ team, pubOdds: pub.o, pinOdds: pin.o, clvPct: Math.round(clvPct * 10) / 10 });
    }
  });
  return results.length > 0 ? results : null;
}

function buildSection(key, emoji, title, count, bodyHtml, instrHtml) {
  const isOpen = sharpOpen[key];
  return '<div class="sec' + (isOpen ? ' open' : '') + '">' +
    '<div class="sec-header" onclick="toggleSharp(\'' + key + '\')">' +
    '<span class="sec-emoji">' + emoji + '</span>' +
    '<div class="sec-info"><div class="sec-title">' + title + '</div><div class="sec-count">' + count + ' signal' + (count !== 1 ? 's' : '') + '</div></div>' +
    '<span class="sec-arrow">▼</span>' +
    '</div>' +
    '<div class="sec-body">' +
    '<div class="sec-signals">' + bodyHtml + '</div>' +
    '<div class="sec-instr">' + instrHtml + '</div>' +
    '</div>' +
    '</div>';
}

function renderSharp() {
  const eligibleGames = allGames.filter(g => !FIGHT_SPORTS.includes(g.sport_key));
  
  const pinSignals = [];
  eligibleGames.forEach(g => {
    const bks = g.bookmakers || [];
    [g.away_team, g.home_team].forEach(t => {
      const pin = bkOdds(bks, t, SHP), pub = bkOdds(bks, t, PUB);
      if (pin && pub) { const d = pub.o - pin.o; if (d >= 8) pinSignals.push({ score: d, game: g, label: t, pin: pin.o, pub: pub.o, bk: pub.bk }); }
    });
  });
  pinSignals.sort((a, b) => b.score - a.score);
  
  const steamSignals = [];
  eligibleGames.forEach(g => {
    const steam = detectSteamMove(g);
    if (steam) steamSignals.push({ game: g, signals: steam });
  });
  
  const rlmSignals = [];
  eligibleGames.forEach(g => {
    const rlm = detectRLM(g);
    if (rlm) rlmSignals.push({ game: g, signals: rlm });
  });
  
  const clvSignals = [];
  eligibleGames.forEach(g => {
    const clv = calcCLV(g);
    if (clv) clvSignals.push({ game: g, signals: clv });
  });
  clvSignals.sort((a, b) => Math.max(...b.signals.map(s => s.clvPct)) - Math.max(...a.signals.map(s => s.clvPct)));
  
  let h = "";
  
  // Pinnacle vs Public
  let pinBody = "";
  if (!pinSignals.length) {
    pinBody = '<div class="empty">No discrepancies ≥8pts right now.</div>';
  } else {
    pinSignals.slice(0, 15).forEach((s, i) => {
      pinBody += '<div class="sc"><div class="sh"><div class="sr">⚡</div><div style="flex:1"><div class="sm">' + s.game.away_team.split(" ").pop() + " vs " + s.game.home_team.split(" ").pop() + '</div><div class="smeta">' + s.game.sport_title + " - " + fmtT(s.game.commence_time) + '</div></div></div><div class="sbb"><div class="sbl">SHARP SIDE</div><div class="sbv">' + s.label + '</div></div><div style="display:flex;gap:6px;flex-wrap:wrap"><span class="pp pin">PIN ' + fmt(s.pin) + '</span><span class="pp pub">' + s.bk.split(" ")[0].toUpperCase() + " " + fmt(s.pub) + '</span><span class="pp" style="background:rgba(78,204,163,.1);color:#4ecca3">DIFF: ' + Math.round(s.score) + '</span></div></div>';
    });
  }
  h += buildSection("pin", "⚡", "PINNACLE VS PUBLIC", pinSignals.length, pinBody,
    '<strong>What it means:</strong> Pinnacle is the sharpest book because they accept huge limits from pros. When Pinnacle\'s odds are shorter than public books by 8+ points, sharps moved the line toward one side.<br><br><strong>How to read it:</strong> The "SHARP SIDE" is where sharp money is. Larger DIFF = stronger signal.<br><br><strong>When to bet:</strong> Bet the sharp side at the public book before their line moves too.');
  
  // Steam
  let steamBody = "";
  if (!steamSignals.length) {
    steamBody = '<div class="empty">No steam moves detected. Refresh periodically to build history.</div>';
  } else {
    steamSignals.slice(0, 10).forEach(s => {
      s.signals.forEach(sig => {
        const dir = sig.avgMove < 0 ? "SHORTER" : "LONGER";
        const dirColor = sig.avgMove < 0 ? "#4ecca3" : "#ff6b6b";
        steamBody += '<div class="sc"><div class="sh"><div class="sr">🔥</div><div style="flex:1"><div class="sm">' + s.game.away_team.split(" ").pop() + " vs " + s.game.home_team.split(" ").pop() + '</div><div class="smeta">' + s.game.sport_title + " - " + fmtT(s.game.commence_time) + '</div></div></div><div class="sbb"><div class="sbl">STEAM ON</div><div class="sbv">' + sig.team + '</div></div><div style="display:flex;gap:6px;flex-wrap:wrap"><span class="sig-steam">' + sig.books + ' BOOKS MOVED</span><span class="pp" style="background:rgba(255,107,107,.1);color:' + dirColor + '">' + dir + ' ' + Math.abs(Math.round(sig.avgMove)) + 'pts</span></div></div>';
      });
    });
  }
  h += buildSection("steam", "🔥", "STEAM MOVES", steamSignals.length, steamBody,
    '<strong>What it means:</strong> When 3+ public sportsbooks move their lines the same direction at the same time. Clearest sign of professional syndicate action hitting multiple books simultaneously.<br><br><strong>How to read it:</strong> Follow the steam immediately. More books moving = stronger signal. Window to catch old price is minutes.<br><br><strong>When to bet:</strong> ASAP on the team the steam is moving TOWARD at any book that hasn\'t moved yet.<br><br><strong>Note:</strong> Needs multiple app refreshes over time to detect movement.');
  
  // RLM
  let rlmBody = "";
  if (!rlmSignals.length) {
    rlmBody = '<div class="empty">No reverse line movement detected yet.</div>';
  } else {
    rlmSignals.slice(0, 10).forEach(s => {
      s.signals.forEach(sig => {
        rlmBody += '<div class="sc"><div class="sh"><div class="sr">🎯</div><div style="flex:1"><div class="sm">' + s.game.away_team.split(" ").pop() + " vs " + s.game.home_team.split(" ").pop() + '</div><div class="smeta">' + s.game.sport_title + " - " + fmtT(s.game.commence_time) + '</div></div></div><div class="sbb"><div class="sbl">RLM TARGET</div><div class="sbv">' + sig.team + '</div></div><div style="display:flex;gap:6px;flex-wrap:wrap"><span class="sig-rlm">LINE MOVED ' + Math.round(sig.movement) + 'pts</span><span class="pp pin">PIN ' + fmt(sig.pinOdds) + '</span><span class="pp pub">PUB ' + fmt(sig.pubOdds) + '</span></div></div>';
      });
    });
  }
  h += buildSection("rlm", "🎯", "REVERSE LINE MOVEMENT", rlmSignals.length, rlmBody,
    '<strong>What it means:</strong> When the public heavily bets one team but the line moves TOWARD the OTHER team. Sharp money is overwhelming public money.<br><br><strong>How to read it:</strong> A team has a line moving against them despite public support (Pinnacle longer than public books) = sharp money on the other side.<br><br><strong>When to bet:</strong> Bet the RLM team - sharps are taking this side.');
  
  // CLV
  let clvBody = "";
  if (!clvSignals.length) {
    clvBody = '<div class="empty">No CLV opportunities ≥3% right now.</div>';
  } else {
    clvSignals.slice(0, 15).forEach(s => {
      s.signals.forEach(sig => {
        clvBody += '<div class="sc"><div class="sh"><div class="sr">💎</div><div style="flex:1"><div class="sm">' + s.game.away_team.split(" ").pop() + " vs " + s.game.home_team.split(" ").pop() + '</div><div class="smeta">' + s.game.sport_title + " - " + fmtT(s.game.commence_time) + '</div></div></div><div class="sbb"><div class="sbl">CLV OPPORTUNITY</div><div class="sbv">' + sig.team + '</div></div><div style="display:flex;gap:6px;flex-wrap:wrap"><span class="sig-clv">+' + sig.clvPct + '% CLV</span><span class="pp pub">PUB ' + fmt(sig.pubOdds) + '</span><span class="pp pin">PIN ' + fmt(sig.pinOdds) + '</span></div></div>';
      });
    });
  }
  h += buildSection("clv", "💎", "CLOSING LINE VALUE", clvSignals.length, clvBody,
    '<strong>What it means:</strong> CLV measures how much better your price is vs Pinnacle (the sharpest book). Beating Pinnacle consistently = profitable bettor.<br><br><strong>How to read it:</strong> 3%+ CLV is solid. 5%+ is strong. 8%+ is excellent.<br><br><strong>When to bet:</strong> Lock in CLV NOW - Pinnacle\'s line will likely move to match public books by game time.');
  
  h += '<div class="legend">' +
    '<div class="legend-title">📖 EMOJI INDEX</div>' +
    '<div class="legend-item"><div class="legend-emoji">⚡</div><div class="legend-text"><div class="legend-name">Pinnacle vs Public</div><div class="legend-desc">Pinnacle\'s odds are 8+ points shorter than public books on one team. Sharp money moved Pinnacle\'s line.</div></div></div>' +
    '<div class="legend-item"><div class="legend-emoji">🔥</div><div class="legend-text"><div class="legend-name">Steam Move</div><div class="legend-desc">3+ sportsbooks moving their lines the same direction simultaneously. Professional syndicate action.</div></div></div>' +
    '<div class="legend-item"><div class="legend-emoji">🎯</div><div class="legend-text"><div class="legend-name">Reverse Line Movement</div><div class="legend-desc">Line moves against the public. Sharp money overwhelming public bets.</div></div></div>' +
    '<div class="legend-item"><div class="legend-emoji">💎</div><div class="legend-text"><div class="legend-name">Closing Line Value</div><div class="legend-desc">Your public book price beats Pinnacle\'s fair line by 3%+ — betting at a discount to true odds.</div></div></div>' +
    '</div>';
  
  document.getElementById("sharp").innerHTML = h;
}

function iProb(o) { return o > 0 ? 100 / (o + 100) : Math.abs(o) / (Math.abs(o) + 100); }
function ev(pin, pub) { if (!pin || !pub) return 0; const fp = Math.min(iProb(pin) * 1.02, 0.99); const dec = pub > 0 ? (pub / 100) + 1 : (100 / Math.abs(pub)) + 1; return Math.round((fp * dec - 1) * 1000) / 10; }

function selectModelSport(sport) {
  selectedModelSport = sport;
  modelView = "details";
  renderModel();
}

function backToModelSports() {
  selectedModelSport = null;
  modelView = "sports";
  renderModel();
}

function renderModel() {
  const eligibleGames = allGames.filter(g => !FIGHT_SPORTS.includes(g.sport_key));
  const cands = [];
  eligibleGames.forEach(g => {
    const bks = g.bookmakers || [];
    [g.away_team, g.home_team].forEach(t => {
      const pin = bkOdds(bks, t, SHP), pub = bkOdds(bks, t, PUB);
      if (!pin || !pub) return;
      const sd = pub.o - pin.o, ev2 = ev(pin.o, pub.o), sc = sd * 0.5 + ev2 * 2;
      if (sc > 5 || ev2 > 1) cands.push({ game: g, label: t, pin: pin.o, pub: pub.o, bk: pub.bk, sharp: sd, ev: ev2, score: sc });
    });
  });
  
  if (!cands.length) { 
    document.getElementById("model").innerHTML = '<div class="empty">No high-value model picks.</div>'; 
    return; 
  }
  
  if (modelView === "sports") {
    const bySport = {};
    cands.forEach(c => {
      const sp = c.game.sport_title;
      if (!bySport[sp]) bySport[sp] = [];
      bySport[sp].push(c);
    });
    
    const sports = Object.keys(bySport).sort((a, b) => bySport[b].length - bySport[a].length);
    
    let h = '<div style="font-size:11px;color:#555;margin-bottom:12px;font-family:monospace">TAP A SPORT TO VIEW PICKS</div>';
    sports.forEach(sp => {
      const picks = bySport[sp];
      const maxScore = Math.max(...picks.map(p => p.score));
      const maxEv = Math.max(...picks.map(p => p.ev));
      h += '<div class="src-card" onclick="selectModelSport(\'' + sp.replace(/'/g, "\\'") + '\')">' +
        '<div><div class="src-name">' + sp + '</div><div class="src-meta">' +
        picks.length + ' picks · top score ' + Math.round(maxScore) + ' · max EV +' + maxEv + '%</div></div>' +
        '<div class="src-count">' + picks.length + '</div>' +
        '</div>';
    });
    document.getElementById("model").innerHTML = h;
    return;
  }
  
  const sportCands = cands.filter(c => c.game.sport_title === selectedModelSport);
  const byDay = {};
  const dayOrder = [];
  sportCands.forEach(c => {
    const dayKey = new Date(c.game.commence_time).toLocaleDateString("en-US", {weekday: "long", month: "short", day: "numeric"});
    if (!byDay[dayKey]) { byDay[dayKey] = []; dayOrder.push(dayKey); }
    byDay[dayKey].push(c);
  });
  dayOrder.sort((a, b) => new Date(byDay[a][0].game.commence_time) - new Date(byDay[b][0].game.commence_time));
  dayOrder.forEach(day => byDay[day].sort((a, b) => b.score - a.score));
  
  let h = '<button class="back-btn" onclick="backToModelSports()">← All Sports</button>';
  h += '<div style="margin-bottom:14px"><div style="font-size:18px;font-weight:900;color:#fff">' + selectedModelSport + '</div><div style="font-size:11px;color:#888;font-family:monospace;margin-top:2px">' + sportCands.length + ' model picks</div></div>';
  
  dayOrder.forEach(day => {
    h += '<div class="dl">' + day + '</div>';
    byDay[day].forEach((p, i) => {
      const strength = p.score >= 20 ? "STRONG" : p.score >= 10 ? "MEDIUM" : "WEAK";
      const strengthColor = p.score >= 20 ? "#4ecca3" : p.score >= 10 ? "#ffc832" : "#888";
      h += '<div class="sc"><div class="sh"><div class="sr">#' + (i + 1) + '</div><div style="flex:1"><div class="sm">' + p.game.away_team.split(" ").pop() + " @ " + p.game.home_team.split(" ").pop() + '</div><div class="smeta">' + fmtT(p.game.commence_time) + '</div></div><span class="pp" style="background:rgba(78,204,163,.1);color:' + strengthColor + ';border:1px solid ' + strengthColor + '40">' + strength + '</span></div><div class="sbb"><div class="sbl">MODEL PICK</div><div class="sbv">' + p.label + '</div></div><div style="display:flex;gap:6px;flex-wrap:wrap"><span class="pp" style="background:rgba(78,204,163,.1);color:#4ecca3">EV +' + p.ev + '%</span><span class="pp" style="background:rgba(200,16,46,.1);color:#ff6b6b">SCORE ' + Math.round(p.score) + '</span><span class="pp pin">PIN ' + fmt(p.pin) + '</span><span class="pp pub">' + p.bk.split(" ")[0].toUpperCase() + " " + fmt(p.pub) + '</span></div></div>';
    });
  });
  
  document.getElementById("model").innerHTML = h;
}

function selectSource(src) { selectedSource = src; picksView = "details"; renderPicks(); }
function backToSources() { selectedSource = null; picksView = "sources"; renderPicks(); }

function renderPicks() {
  if (!allPicks.length) {
    document.getElementById("picks").innerHTML = '<div class="empty">No picks available.</div>';
    return;
  }
  if (picksView === "sources") {
    const bySource = {};
    allPicks.forEach(p => {
      const src = p.source || "Unknown";
      if (!bySource[src]) bySource[src] = { picks: [], expert: p.expert };
      bySource[src].picks.push(p);
    });
    const sources = Object.keys(bySource).sort((a, b) => bySource[b].picks.length - bySource[a].picks.length);
    let h = '<div style="font-size:11px;color:#555;margin-bottom:12px;font-family:monospace">TAP A SOURCE TO VIEW PICKS</div>';
    sources.forEach(src => {
      const info = bySource[src];
      const avgConf = info.picks.reduce((a, p) => a + p.confidence, 0) / info.picks.length;
      const highEV = info.picks.filter(p => p.ev === "HIGH").length;
      h += '<div class="src-card" onclick="selectSource(\'' + src.replace(/'/g, "\\'") + '\')">' +
        '<div><div class="src-name">' + src + '</div><div class="src-meta">' + 
        info.picks.length + ' picks · avg ' + avgConf.toFixed(1) + '★ · ' + highEV + ' high EV</div></div>' +
        '<div class="src-count">' + info.picks.length + '</div></div>';
    });
    document.getElementById("picks").innerHTML = h;
    return;
  }
  const sourcePicks = allPicks.filter(p => (p.source || "Unknown") === selectedSource);
  const byDay = {};
  const dayOrder = [];
  sourcePicks.forEach(p => {
    const dayKey = p.day || "Undated";
    if (!byDay[dayKey]) { byDay[dayKey] = []; dayOrder.push(dayKey); }
    byDay[dayKey].push(p);
  });
  dayOrder.forEach(day => {
    byDay[day].sort((a, b) => {
      if (b.confidence !== a.confidence) return b.confidence - a.confidence;
      const evRank = { HIGH: 2, MEDIUM: 1 };
      return (evRank[b.ev] || 0) - (evRank[a.ev] || 0);
    });
  });
  let h = '<button class="back-btn" onclick="backToSources()">← All Sources</button>';
  h += '<div style="margin-bottom:14px"><div style="font-size:18px;font-weight:900;color:#fff">' + selectedSource + '</div><div style="font-size:11px;color:#888;font-family:monospace;margin-top:2px">' + sourcePicks.length + ' picks total</div></div>';
  dayOrder.forEach(day => {
    h += '<div class="dl">' + day + '</div>';
    byDay[day].forEach(p => {
      h += '<div class="sc"><div style="display:flex;justify-content:space-between;margin-bottom:6px">' +
        '<div><div class="sm">' + p.expert + '</div><div class="smeta">' + (p.sport || "Sports") + '</div></div>' +
        '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px"><div style="font-size:13px">' + "⭐".repeat(p.confidence) + '</div>' +
        (p.ev === "HIGH" ? '<span class="pp" style="background:rgba(78,204,163,.12);color:#4ecca3;font-size:9px">HIGH EV</span>' : p.ev === "MEDIUM" ? '<span class="pp" style="background:rgba(255,200,50,.1);color:#ffc832;font-size:9px">MED EV</span>' : '') +
        '</div></div>' +
        '<div class="sbb"><div class="sbl">' + (p.betType || "PICK") + '</div><div class="sbv">' + p.bet + '</div></div>' +
        (p.detail ? '<div style="font-size:11px;color:#555;margin-top:6px">' + p.detail.slice(0, 200) + '</div>' : "") +
        '</div>';
    });
  });
  document.getElementById("picks").innerHTML = h;
}

async function loadPicks() {
  try {
    const r = await fetch("/api/picks");
    const data = await r.json();
    const picks = data.picks || [];
    picks.forEach(p => { p.day = "Recent"; });
    allPicks = picks;
    picksView = "sources";
    selectedSource = null;
    renderPicks();
  } catch (e) {
    document.getElementById("picks").innerHTML = '<div class="empty">Picks error: ' + e.message + '</div>';
  }
}

async function init() {
  const btn = document.getElementById("rfBtn");
  btn.classList.add("spin");
  document.getElementById("hSub").textContent = "LOADING...";
  document.getElementById("games").innerHTML = '<div class="lstate"><div class="lico">⚙️</div><div class="ltxt">FETCHING ODDS</div></div>';
  setTimeout(loadPicks, 500);
  try {
    const sr = await fetch("/api/sports");
    const sports = await sr.json();
    const now = Date.now();
    const results = [];
    const promises = sports.map(sp => fetch("/api/odds?sport=" + sp.key).then(r => r.json()).then(data => {
      if (Array.isArray(data)) {
        data.forEach(g => {
          const t = new Date(g.commence_time).getTime();
          if (t >= now - 86400000 && t <= now + WEEK) results.push(g);
        });
      }
    }).catch(() => { }));
    await Promise.all(promises);
    results.sort((a, b) => new Date(a.commence_time) - new Date(b.commence_time));
    allGames = results;
    allGames.forEach(captureSnapshot);
    saveHistory();
    modelView = "sports";
    selectedModelSport = null;
    sharpOpen = {};
    document.getElementById("hBadge").innerHTML = '<span class="badge">LIVE</span>';
    document.getElementById("hSub").textContent = "UPDATED " + new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
    const sc = {}; results.forEach(g => sc[g.sport_title] = true);
    document.getElementById("sL").textContent = results.length + " GAMES - " + Object.keys(sc).length + " SPORTS";
    document.getElementById("sR").textContent = "ODDS + SHARP";
    renderFltrs(); renderGames(); renderSharp(); renderModel();
  } catch (e) {
    document.getElementById("games").innerHTML = '<div class="empty">Error: ' + e.message + '</div>';
    document.getElementById("hSub").textContent = "ERROR";
  }
  btn.classList.remove("spin");
}
init();
</script>
