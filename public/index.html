<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPR Model</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#e0e0e0;font-family:-apple-system,sans-serif;min-height:100vh;padding:16px}
.hdr{font-size:20px;font-weight:900;margin-bottom:16px}
.log{background:#111;border:1px solid #333;border-radius:8px;padding:10px;margin-bottom:6px;font-family:monospace;font-size:11px;line-height:1.5;word-break:break-word}
.ok{color:#4ecca3}
.err{color:#ff6b6b;background:#2a0505}
.info{color:#888}
.game{background:#111;border:1px solid #333;border-radius:8px;padding:10px;margin-bottom:6px;font-size:12px}
button{background:#4ecca3;color:#000;border:none;padding:10px 20px;border-radius:6px;font-weight:700;margin-bottom:16px;cursor:pointer;margin-right:8px}
</style>
</head>
<body>
<div class="hdr">BPR MODEL</div>
<button onclick="location.reload()">Reload</button>
<button onclick="go()">Test Again</button>
<div id="out"></div>
<script>
var out=document.getElementById("out");
function log(msg,cls){var d=document.createElement("div");d.className="log "+(cls||"info");d.textContent=msg;out.appendChild(d);window.scrollTo(0,document.body.scrollHeight);}

async function go(){
out.innerHTML=””;
log(“Start: “+new Date().toLocaleTimeString(),“info”);

try{
log(“Step 1: fetch /api/sports”,“info”);
var t1=Date.now();
var r1=await fetch(”/api/sports”);
log(”  got response in “+(Date.now()-t1)+“ms status=”+r1.status,“ok”);
var sports=await r1.json();
log(”  parsed “+sports.length+” sports”,“ok”);

log(“Step 2: parallel fetch all odds”,“info”);
var t2=Date.now();
var results=[];
var promises=[];
for(var i=0;i<sports.length;i++){
(function(sp){
var p=fetch(”/api/odds?sport=”+sp.key).then(function(r){
log(”  “+sp.key+” status=”+r.status+” in “+(Date.now()-t2)+“ms”,“ok”);
return r.json();
}).then(function(data){
if(Array.isArray(data)){
log(”  “+sp.key+”: “+data.length+” games”,“ok”);
for(var j=0;j<data.length;j++)results.push(data[j]);
}else{
log(”  “+sp.key+”: not array: “+JSON.stringify(data).slice(0,100),“err”);
}
}).catch(function(e){
log(”  “+sp.key+” ERROR: “+e.message,“err”);
});
promises.push(p);
})(sports[i]);
}

log(”  waiting for all “+promises.length+” requests…”,“info”);
await Promise.all(promises);
log(“Step 2 done in “+(Date.now()-t2)+“ms, total “+results.length+” games”,“ok”);

log(“Step 3: render “+results.length+” games”,“info”);
for(var j=0;j<Math.min(10,results.length);j++){
var g=results[j];
var div=document.createElement(“div”);
div.className=“game”;
div.textContent=g.sport_title+”: “+g.away_team+” @ “+g.home_team;
out.appendChild(div);
}
log(“DONE. All working!”,“ok”);

}catch(e){
log(“FATAL: “+e.message,“err”);
log(“Stack: “+(e.stack||“no stack”),“err”);
}
}
go();
</script>

</body>
</html>
