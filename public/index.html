<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPR Model</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600&family=Barlow+Condensed:wght@600;700;900&family=Space+Mono:wght@400;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0a0f;color:#e0e0e0;font-family:'Barlow',sans-serif;min-height:100vh}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .header{background:linear-gradient(135deg,#0d0d1a,#111122);border-bottom:1px solid rgba(255,255,255,0.06);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .header-left{display:flex;align-items:center;gap:10px}
  .header-icon{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#c8102e,#041e42);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
  .header-title{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:900;letter-spacing:1px;color:#fff}
  .header-sub{font-size:10px;color:#555;letter-spacing:1px;margin-top:1px}
  .header-right{display:flex;align-items:center;gap:10px}
  .refresh-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#aaa;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all 0.2s;flex-shrink:0}
  .refresh-btn.spinning{animation:spin 1s linear infinite}
  .badge-live{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:1px;background:rgba(78,204,163,0.1);border:1px solid rgba(78,204,163,0.3);color:#4ecca3}
  .main{max-width:680px;margin:0 auto;padding:20px 16px}
  .err-msg{color:#ff6b6b;font-size:11px;margin-bottom:12px;font-family:'Space Mono',monospace}
  .status-bar{font-family:'Space Mono',monospace;font-size:10px;color:#555;margin-bottom:16px;display:flex;justify-content:space-between}
  .filters{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
  .filter-btn{background:transparent;border:1px solid rgba(255,255,255,0.07);border-radius:20px;color:#555;padding:5px 12px;font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;cursor:pointer;white-space:nowrap;transition:all 0.15s}
  .filter-btn.active{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);color:#fff}
  .count{font-family:'Space Mono',monospace;font-size:10px;color:#444;margin-bottom:14px;letter-spacing:1px}
  .section-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:#333;letter-spacing:2px;text-transform:uppercase;margin:18px 0 8px;padding-bottom:5px;border-bottom:1px solid rgba(255,255,255,0.04)}
  .games{animation:fadeIn 0.3s ease}
  .game-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 16px;cursor:pointer;transition:background 0.2s;margin-bottom:8px}
  .game-card:active{background:rgba(255,255,255,0.06)}
  .card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .card-top-left{display:flex;align-items:center;gap:7px}
  .sport-label{font-family:'Space Mono',monospace;font-size:10px;color:#666;letter-spacing:1px;text-transform:uppercase}
  .live-dot{background:#ff4444;color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;animation:pulse 1.5s infinite}
  .book-tag{font-family:'Space Mono',monospace;font-size:9px;padding:2px 6px;border-radius:3px;background:rgba(200,16,46,0.15);color:#c8102e;border:1px solid rgba(200,16,46,0.25)}
  .time-label{font-family:'Space Mono',monospace;font-size:10px;color:#444}
  .matchup{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
  .team-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:#f0f0f0;line-height:1.2}
  .team-side{font-size:10px;color:#555;margin-top:1px;margin-bottom:5px}
  .team-right{text-align:right}
  .vs{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;color:#222;letter-spacing:2px;text-align:center}
  .odds-chip{display:inline-block;padding:3px 9px;border-radius:5px;font-family:'Space Mono',monospace;font-size:12px;font-weight:700}
  .pos{background:rgba(78,204,163,0.12);color:#4ecca3;border:1px solid rgba(78,204,163,0.3)}
  .neg{background:rgba(255,107,107,0.12);color:#ff6b6b;border:1px solid rgba(255,107,107,0.3)}
  .expand-area{margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.05);display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .expand-area.one{grid-template-columns:1fr}
  .mkt-title{font-family:'Space Mono',monospace;font-size:9px;color:#444;letter-spacing:1px;margin-bottom:6px}
  .mkt-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
  .mkt-label{font-size:11px;color:#777}
  .expand-hint{text-align:center;margin-top:8px;color:#333;font-size:10px;font-family:'Space Mono',monospace}
  .loading-state{text-align:center;padding:50px 20px;color:#555}
  .spin-icon{font-size:32px;display:inline-block;animation:spin 1.2s linear infinite;margin-bottom:14px}
  .loading-text{font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:2px}
  .loading-sub{font-size:10px;color:#444;margin-top:6px;font-family:'Space Mono',monospace}
  .footer{margin-top:36px;text-align:center;font-size:10px;color:#222;font-family:'Space Mono',monospace;padding-bottom:32px;line-height:1.8}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="header-icon">🎰</div>
    <div>
      <div class="header-title">BPR MODEL</div>
      <div class="header-sub" id="hSub">LOADING…</div>
    </div>
  </div>
  <div class="header-right">
    <div id="hBadge"></div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadOdds()" title="Refresh">↻</button>
  </div>
</div>
<div class="main">
  <div id="errMsg" class="err-msg" style="display:none"></div>
  <div class="status-bar"><span id="sLeft">—</span><span id="sRight"></span></div>
  <div class="filters" id="filters"></div>
  <div class="count" id="count"></div>
  <div id="content"></div>
  <div class="footer">BPR MODEL · Powered by The Odds API<br>Verify all lines before wagering</div>
</div>
<script>
const BASE = window.location.origin;
const WEEK = 7*24*3600*1000;
const S_ICONS={basketball:'🏀',americanfootball:'🏈',baseball:'⚾',icehockey:'🏒',soccer:'⚽',mma:'🥊',tennis:'🎾',golf:'⛳',boxing:'🥊'};
const S_COLORS={basketball:'#C9082A',americanfootball:'#013369',baseball:'#002D72',icehockey:'#0033A0',soccer:'#3D195B',mma:'#B8242B',boxing:'#B8242B',default:'#555'};
let allGames=[],currentFilter='All',expanded={};
const si=k=>S_ICONS[k.split('_')[0]]||'🎯';
const sc=k=>S_COLORS[k.split('_')[0]]||S_COLORS.default;
const fmt=p=>p>0?'+'+p:''+p;
const chip=p=>`<span class="odds-chip ${p>=0?'pos':'neg'}">${fmt(p)}</span>`;
function isLive(t){return new Date(t)<new Date();}
function fmtTime(t){
  const d=new Date(t),now=new Date(),diff=d-now;
  if(diff<0)return'In Progress';
  if(diff<10800000){const m=Math.floor(diff/60000),h=Math.floor(m/60);return h>0?h+'h '+m%60+'m':m+'m';}
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
}
async function loadOdds(){
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('hSub').textContent='LOADING…';
  document.getElementById('hBadge').innerHTML='';
  document.getElementById('errMsg').style.display='none';
  document.getElementById('content').innerHTML='<div class="loading-state"><div class="spin-icon">⚙️</div><div class="loading-text">FETCHING ODDS</div><div class="loading-sub" id="loadSub">Getting sports list…</div></div>';
  try{
    const sports=await fetch(`${BASE}/api/sports`).then(r=>r.json());
    if(!Array.isArray(sports))throw new Error(sports.message||sports.error||'API error');
    const now=Date.now(),results=[];
    for(const sport of sports){
      const sub=document.getElementById('loadSub');
      if(sub)sub.textContent=`Fetching ${sport.title}…`;
      try{
        const data=await fetch(`${BASE}/api/odds?sport=${sport.key}`).then(r=>r.json());
        if(Array.isArray(data)){
          results.push(...data.filter(g=>{
            const t=new Date(g.commence_time).getTime();
            return t>=now-7200000&&t<=now+WEEK;
          }));
        }
      }catch(e){}
    }
    results.sort((a,b)=>new Date(a.commence_time)-new Date(b.commence_time));
    allGames=results;
    if(!results.length){
      document.getElementById('hSub').textContent='NO GAMES FOUND';
      document.getElementById('content').innerHTML='<div style="text-align:center;padding:50px 20px;color:#444"><div style="font-size:36px;margin-bottom:12px">📭</div><div style="font-family:Barlow Condensed,sans-serif;font-size:16px">No upcoming games found</div></div>';
    }else{
      const fCount=results.filter(g=>g.bookmakers?.[0]?.key==='fanatics').length;
      const sCount=new Set(results.map(g=>g.sport_title)).size;
      document.getElementById('hBadge').innerHTML='<span class="badge-live">LIVE</span>';
      document.getElementById('hSub').textContent='UPDATED '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
      document.getElementById('sLeft').textContent=`${results.length} GAMES · ${sCount} SPORTS`;
      document.getElementById('sRight').textContent=fCount>0?`${fCount} FANATICS`:'BEST US BOOK';
      renderFilters();renderGames();
    }
  }catch(e){
    document.getElementById('errMsg').textContent='Error: '+e.message;
    document.getElementById('errMsg').style.display='block';
    document.getElementById('hSub').textContent='ERROR';
    document.getElementById('content').innerHTML='';
  }finally{btn.classList.remove('spinning');}
}
function renderFilters(){
  const sports=['All',...new Set(allGames.map(g=>g.sport_title))];
  document.getElementById('filters').innerHTML=sports.map(s=>{
    const k=allGames.find(g=>g.sport_title===s)?.sport_key||'';
    return`<button class="filter-btn ${currentFilter===s?'active':''}" onclick="setFilter(${JSON.stringify(s)})">${s==='All'?'All':si(k)+' '+s}</button>`;
  }).join('');
}
function setFilter(f){currentFilter=f;renderFilters();renderGames();}
function toggleExpand(id){expanded[id]=!expanded[id];renderGames();}
function renderGames(){
  const filtered=currentFilter==='All'?allGames:allGames.filter(g=>g.sport_title===currentFilter);
  document.getElementById('count').textContent=`${filtered.length} GAME${filtered.length!==1?'S':''} · NEXT 7 DAYS`;
  const byDate={};
  filtered.forEach(g=>{
    const label=new Date(g.commence_time).toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
    if(!byDate[label])byDate[label]=[];
    byDate[label].push(g);
  });
  let html='<div class="games">';
  for(const[dateLabel,games]of Object.entries(byDate)){
    html+=`<div class="section-label">${dateLabel}</div>`;
    html+=games.map(game=>{
      const bk=game.bookmakers?.[0];
      const h2h=bk?.markets?.find(m=>m.key==='h2h');
      const spreads=bk?.markets?.find(m=>m.key==='spreads');
      const totals=bk?.markets?.find(m=>m.key==='totals');
      const accent=sc(game.sport_key);
      const isFan=bk?.key==='fanatics';
      const awayO=h2h?.outcomes?.find(o=>o.name===game.away_team);
      const homeO=h2h?.outcomes?.find(o=>o.name===game.home_team);
      const isExp=!!expanded[game.id];
      let mkts='';
      if(isExp&&(spreads||totals)){
        mkts=`<div class="expand-area ${spreads&&totals?'':'one'}">`;
        if(spreads)mkts+=`<div><div class="mkt-title">SPREAD</div>${spreads.outcomes.map(o=>`<div class="mkt-row"><span class="mkt-label">${o.name.split(' ').pop()} ${o.point>0?'+'+o.point:o.point}</span>${chip(o.price)}</div>`).join('')}</div>`;
        if(totals)mkts+=`<div><div class="mkt-title">TOTAL (${totals.outcomes?.[0]?.point||''})</div>${totals.outcomes.map(o=>`<div class="mkt-row"><span class="mkt-label">${o.name}</span>${chip(o.price)}</div>`).join('')}</div>`;
        mkts+='</div>';
      }
      return`<div class="game-card" style="border-left:3px solid ${accent}" onclick="toggleExpand('${game.id}')">
        <div class="card-top">
          <div class="card-top-left">
            <span>${si(game.sport_key)}</span>
            <span class="sport-label">${game.sport_title}</span>
            ${isLive(game.commence_time)?'<span class="live-dot">LIVE</span>':''}
            ${isFan?'<span class="book-tag">Fanatics</span>':''}
          </div>
          <span class="time-label">🕐 ${fmtTime(game.commence_time)}</span>
        </div>
        <div class="matchup">
          <div><div class="team-name">${game.away_team}</div><div class="team-side">Away</div>${awayO?chip(awayO.price):''}</div>
          <div class="vs">VS</div>
          <div class="team-right"><div class="team-name">${game.home_team}</div><div class="team-side">Home</div>${homeO?chip(homeO.price):''}</div>
        </div>${mkts}
        <div class="expand-hint">${isExp?'▲ collapse':'▼ spreads & totals'}</div>
      </div>`;
    }).join('');
  }
  html+='</div>';
  document.getElementById('content').innerHTML=html;
}
loadOdds();
</script>
</body>
</html>
ENDOFFILE
