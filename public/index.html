<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J LAB</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
.hdr{background:linear-gradient(135deg,#0d0d1a,#111122);border-bottom:1px solid rgba(255,255,255,.06);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr-icon{width:44px;height:32px;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.hdr-icon img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.hdr-title{font-size:18px;font-weight:900;letter-spacing:1px;color:#fff}
.hdr-sub{font-size:10px;color:#555;letter-spacing:1px}
.rfsh{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#aaa;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px}
.rfsh.spin{animation:spin 1s linear infinite}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;background:rgba(78,204,163,.1);border:1px solid rgba(78,204,163,.3);color:#4ecca3}
.main{max-width:680px;margin:0 auto;padding:14px}
.tabs{display:flex;margin-bottom:14px;border:1px solid rgba(255,255,255,.08);border-radius:10px;overflow:hidden}
.tab{flex:1;background:transparent;border:none;color:#555;padding:9px 2px;font-weight:700;font-size:10px;cursor:pointer}
.tab.on{background:rgba(255,255,255,.08);color:#fff}
.tab+.tab{border-left:1px solid rgba(255,255,255,.08)}
.sb{font-size:10px;color:#555;margin-bottom:10px;display:flex;justify-content:space-between;font-family:monospace}
.fltrs{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;padding-bottom:3px}
.fbtn{background:transparent;border:1px solid rgba(255,255,255,.07);border-radius:20px;color:#555;padding:6px 11px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.fbtn.on{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:#fff}
.cnt{font-size:10px;color:#444;margin-bottom:10px;font-family:monospace}
.dl{font-size:11px;font-weight:700;color:#333;letter-spacing:2px;text-transform:uppercase;margin:14px 0 7px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,.04)}
.gc{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:13px 15px;cursor:pointer;margin-bottom:7px}
.gt{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.gtl{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.sl{font-size:10px;color:#666;letter-spacing:1px;font-family:monospace}
